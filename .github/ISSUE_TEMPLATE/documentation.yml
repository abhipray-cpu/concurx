name: 📚 Documentation Issue
description: Report an issue with documentation
title: "[Docs]: "
labels: ["documentation", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve our documentation! Please provide details about the documentation issue.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-flight Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true

  - type: dropdown
    id: doc-type
    attributes:
      label: Documentation Type
      description: Which type of documentation has the issue?
      options:
        - README.md
        - Architecture and Patterns (docs/ARCHITECTURE.md)
        - Usage Guide (docs/USAGE.md)
        - Contributing Guide (CONTRIBUTING.md)
        - Code comments/godoc
        - Examples
        - Other
    validations:
      required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: Issue Type
      description: What kind of documentation issue is this?
      options:
        - Outdated information
        - Missing information
        - Incorrect information
        - Unclear explanation
        - Broken link
        - Typo/Grammar
        - Missing example
        - Formatting issue
        - Other
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Document Location
      description: Provide a link or path to the specific section
      placeholder: "e.g., docs/USAGE.md line 123, or https://github.com/abhipray-cpu/concurx/blob/main/docs/USAGE.md#section"

  - type: textarea
    id: description
    attributes:
      label: Issue Description
      description: Clearly describe the documentation issue
      placeholder: Describe what's wrong with the documentation...
    validations:
      required: true

  - type: textarea
    id: current-content
    attributes:
      label: Current Content
      description: If applicable, quote the current problematic content
      placeholder: Current text that needs to be changed...

  - type: textarea
    id: suggested-fix
    attributes:
      label: Suggested Fix
      description: If you have a suggestion for how to fix this, please provide it
      placeholder: Suggested replacement text or improvement...

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the documentation issue