name: ❓ Question
description: Ask a question about concurx usage or best practices
title: "[Question]: "
labels: ["question", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in concurx! Please help us understand your question.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-flight Checklist
      options:
        - label: I have searched existing issues and discussions
          required: true
        - label: I have checked the documentation (README, docs folder, examples)
          required: true

  - type: dropdown
    id: category
    attributes:
      label: Question Category
      description: What area is your question about?
      options:
        - General usage
        - Concurrency patterns
        - Error handling
        - Performance optimization
        - Best practices
        - Architecture/design
        - Integration with other libraries
        - Troubleshooting
        - Other
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Relevant Component
      description: Which concurx component is your question about? (if applicable)
      options:
        - Group (concurrent task execution)
        - Supervisor (fault tolerance)
        - WorkerGroup (worker management)
        - Patterns (bulkhead, fanout, pipeline, etc.)
        - Backoff strategies
        - Metrics/Observability
        - Circuit Breaker
        - General/Multiple components
        - Not sure

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
      placeholder: Please describe your question in detail...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Provide any relevant context about your use case
      placeholder: |
        - What are you trying to achieve?
        - What's your current approach?
        - What challenges are you facing?
        - Any specific requirements or constraints?

  - type: textarea
    id: code-example
    attributes:
      label: Code Example
      description: If applicable, provide a minimal code example
      render: go
      placeholder: |
        // Your code example here
        package main
        
        import "github.com/abhipray-cpu/concurx/group"
        
        func main() {
            // Your use case...
        }

  - type: input
    id: go-version
    attributes:
      label: Go Version
      description: What version of Go are you using?
      placeholder: "e.g., go1.25.1"

  - type: input
    id: concurx-version
    attributes:
      label: Concurx Version
      description: What version of concurx are you using?
      placeholder: "e.g., v1.0.0 or latest main branch"

  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Any other details that might be helpful