name: Stale Issue Management
on:
  schedule:
    - cron: '0 2 1 * 1' # Run every Monday at 2 AM UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    name: Clean up stale issues and PRs
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          
          # Stale issue configuration
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          close-issue-label: 'closed-stale'
          
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity. 
            
            It will be closed in 14 days if no further activity occurs. 
            
            If this issue is still relevant, please:
            - Add a comment to keep it open
            - Provide additional context or updates
            - Create a pull request to address it
            
            Thank you for your contribution! 🙏
            
          close-issue-message: |
            This issue has been automatically closed due to inactivity.
            
            If this issue is still relevant, please feel free to reopen it or create a new issue 
            with updated information.
            
          # Stale PR configuration  
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          close-pr-label: 'closed-stale'
          
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had 
            recent activity.
            
            It will be closed in 7 days if no further activity occurs.
            
            If this PR is still relevant, please:
            - Rebase on the latest main branch
            - Address any review comments
            - Add a comment with current status
            
            Thank you for your contribution! 🙏
            
          close-pr-message: |
            This pull request has been automatically closed due to inactivity.
            
            If you'd like to continue this work, please feel free to reopen the PR after 
            rebasing on the latest main branch.
            
          # Labels to exempt from stale processing
          exempt-issue-labels: 'security,critical,bug,enhancement,good-first-issue,help-wanted,pinned'
          exempt-pr-labels: 'security,critical,work-in-progress,blocked'
          
          # Only issues/PRs with all of these labels will be processed
          any-of-labels: ''
          
          # Don't process draft PRs
          exempt-draft-pr: true
          
          # Additional options
          remove-stale-when-updated: true
          delete-branch: false
          start-date: '2024-01-01T00:00:00Z'
          
          # Debug mode (set to true for testing)
          debug-only: false
