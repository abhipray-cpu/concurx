name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run full test suite
        run: |
          go test ./... -v -race -count=3

      - name: Build examples
        run: |
          for example in examples/*/; do
            if [ -f "$example/main.go" ]; then
              echo "Building $example"
              cd "$example"
              go build .
              cd ../..
            fi
          done

      - name: Extract release notes
        id: extract_release_notes
        run: |
          # Extract release notes from git commit messages since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RELEASE_NOTES=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --no-merges)
          else
            RELEASE_NOTES=$(git log --pretty=format:"- %s" --no-merges)
          fi
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Changes in ${{ github.ref_name }}
            
            ${{ steps.extract_release_notes.outputs.RELEASE_NOTES }}
            
            ## Installation
            
            ```bash
            go get github.com/abhipray-cpu/concurx@${{ github.ref_name }}
            ```
            
            ## Documentation
            
            - [Architecture and Patterns](https://github.com/abhipray-cpu/concurx/blob/main/docs/ARCHITECTURE.md)
            - [Usage Guide](https://github.com/abhipray-cpu/concurx/blob/main/docs/USAGE.md) 
            - [Contributing](https://github.com/abhipray-cpu/concurx/blob/main/CONTRIBUTING.md)
            
            ## Verify Installation
            
            ```bash
            go get github.com/abhipray-cpu/concurx
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: release
    if: success()
    steps:
      - name: Create Summary
        run: |
          echo "## 🚀 Release ${{ github.ref_name }} Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The new version of concurx has been successfully released!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Installation:** \`go get github.com/abhipray-cpu/concurx@${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY