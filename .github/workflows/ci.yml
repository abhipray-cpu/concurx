# ============================================================
# concurx — Unified CI Pipeline
#
# Stage order (each stage needs the previous to pass):
#
#   build ──► lint ──► unit-tests ──► race ──► integration
#                                                    │
#                                             ┌──────┴──────┐
#                                          security      benchmarks
#                                             │
#                                          stability  (push to main only)
#
# On tag push (v*):  all stages run, then "release" publishes.
# ============================================================
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - 'v*'
  schedule:
    - cron: '0 2 * * 1'   # nightly, to catch dependency drift
  workflow_dispatch:        # allow manual trigger from GitHub UI

env:
  GO_VERSION: '1.25.8'

# ─────────────────────────────────────────────
# Stage 1 — Build
# Fast fail: if it doesn't compile, nothing else runs.
# ─────────────────────────────────────────────
jobs:
  build:
    name: "Stage 1 · Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: Verify module is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

# ─────────────────────────────────────────────
# Stage 2 — Lint
# Needs: build
# ─────────────────────────────────────────────
  lint:
    name: "Stage 2 · Lint"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

# ─────────────────────────────────────────────
# Stage 3 — Unit Tests (matrix: OS × Go version)
# Needs: lint
# ─────────────────────────────────────────────
  unit-tests:
    name: "Stage 3 · Unit Tests (${{ matrix.os }} / go${{ matrix.go-version }})"
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.25.8', '1.24.x']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test $(go list ./... | grep -v '/examples/' | grep -v '/stress/') -v -coverprofile=coverage.out -timeout=5m

      - name: Upload coverage (ubuntu / latest Go only)
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25.8'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          fail_ci_if_error: false   # don't break CI on Codecov flakiness

# ─────────────────────────────────────────────
# Stage 4 — Race Detector
# Needs: unit-tests (all matrix cells must pass)
# ─────────────────────────────────────────────
  race:
    name: "Stage 4 · Race Detector"
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run race detector
        run: go test $(go list ./... | grep -v '/examples/' | grep -v '/stress/') -race -count=5 -timeout=10m

# ─────────────────────────────────────────────
# Stage 5 — Integration Tests
# Needs: race
# ─────────────────────────────────────────────
  integration:
    name: "Stage 5 · Integration Tests"
    needs: race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        run: go test -v -race -run ^TestIntegration $(go list ./... | grep -v '/examples/' | grep -v '/stress/') -timeout=5m

# ─────────────────────────────────────────────
# Stage 6a — Security Scan
# Needs: integration
# ─────────────────────────────────────────────
  security:
    name: "Stage 6a · Security Scan"
    needs: integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

# ─────────────────────────────────────────────
# Stage 6b — Benchmarks
# Needs: integration (runs in parallel with security)
# Only on ubuntu to keep costs low.
# ─────────────────────────────────────────────
  benchmarks:
    name: "Stage 6b · Benchmarks"
    needs: integration
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push benchmark results to gh-pages
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Pre-build test binaries (warm cache)
        run: go test -run=^$ -count=0 ./group/... ./patterns/... ./supervisor/... ./workergroup/...

      - name: Run benchmarks
        run: |
          BENCH_PKGS=$(go list \
            ./group/... \
            ./patterns/bulkhead/... \
            ./patterns/circuitbreaker/... \
            ./patterns/fanoutin/... \
            ./patterns/mapreduce/... \
            ./patterns/pipeline/... \
            ./patterns/ratelimiter/... \
            ./patterns/retry/... \
            ./patterns/scattergather/... \
            ./patterns/throttler/... \
            ./patterns/timeout/... \
            ./patterns/workerpercore/... \
            ./supervisor/... \
            ./workergroup/...)
          go test -bench=. -benchmem -benchtime=300ms -run=^$ -timeout=10m $BENCH_PKGS > benchmark.txt

      - name: Store benchmark result (main branch only)
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'go'
          output-file-path: benchmark.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          comment-on-alert: true
          alert-threshold: '200%'
          fail-on-alert: false

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmark.txt
          retention-days: 30

# ─────────────────────────────────────────────
# Stage 7 — Stability (push to main only)
# Needs: security + benchmarks both passing.
# Runs tests 40 times to surface flaky tests.
# ─────────────────────────────────────────────
  stability:
    name: "Stage 7 · Stability (×40)"
    needs: [security, benchmarks]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Stability run
        run: go test $(go list ./... | grep -v '/examples/' | grep -v '/stress/') -count=40 -timeout=30m

# ─────────────────────────────────────────────
# Stage 8 — Release (tag push v* only)
# Needs: all stages (via stability or security+benchmarks).
# stability only runs on branch push, so we gate on
# security+benchmarks for tag pushes.
# ─────────────────────────────────────────────
  release:
    name: "Stage 8 · Publish Release"
    needs: [security, benchmarks]
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ github.ref_name }}"
          # Pull the section for this version out of CHANGELOG.md
          NOTES=$(awk "/^## \[${VERSION#v}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "concurx ${{ github.ref_name }}"
          body: |
            ## Installation

            ```bash
            go get github.com/abhipray-cpu/concurx@${{ github.ref_name }}
            ```

            ## What's changed

            ${{ steps.notes.outputs.NOTES }}

            ## Documentation

            - [Architecture & Patterns](https://github.com/${{ github.repository }}/blob/main/docs/ARCHITECTURE.md)
            - [Usage Guide](https://github.com/${{ github.repository }}/blob/main/docs/USAGE.md)
            - [pkg.go.dev](https://pkg.go.dev/github.com/abhipray-cpu/concurx@${{ github.ref_name }})
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Summary
        run: |
          echo "## 🚀 Released ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`go get github.com/abhipray-cpu/concurx@${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
